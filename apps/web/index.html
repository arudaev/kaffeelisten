<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Kaffeelisten" />
    <meta name="theme-color" content="#D97706" />
    <meta name="description" content="Kaffee- und Snack-Verbrauch am ITC1 Campus digital erfassen" />
    <title>Kaffeelisten</title>
    <script>
      // Anti-FOUC: apply the stored theme mode AND the cached brand-palette accent
      // before first paint, so a new page never flashes the default palette.
      (function () {
        try {
          var m = localStorage.getItem('kaffeelisten-theme-mode') || 'system';
          var dark = m === 'dark' || (m === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          var mode = dark ? 'dark' : 'light';
          var root = document.documentElement;
          root.dataset.mode = mode;
          var raw = localStorage.getItem('kaffeelisten-theme-vars');
          if (raw) {
            var vars = JSON.parse(raw)[mode] || {};
            for (var k in vars) root.style.setProperty(k, vars[k]);
          }
        } catch (e) {
          document.documentElement.dataset.mode = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
